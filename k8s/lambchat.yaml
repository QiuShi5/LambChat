---
# LambChat App Deployment
# Replace HOST_IP with your actual host IP (e.g., 192.168.1.100)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lambchat
  namespace: lambchat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lambchat
  template:
    metadata:
      labels:
        app: lambchat
    spec:
      containers:
      - name: lambchat
        image: ghcr.io/yanyutin753/lambchat:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
        # --- Secrets ---
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: jwt-secret-key
        - name: MCP_ENCRYPTION_SALT
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: mcp-encryption-salt
        # --- MongoDB ---
        - name: MONGODB_URL
          value: "mongodb://HOST_IP:27017"
        - name: MONGODB_DB
          value: "agent_state"
        - name: MONGODB_ENABLED
          value: "true"
        - name: MONGODB_USERNAME
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: mongodb-username
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: mongodb-password
        - name: MONGODB_AUTH_SOURCE
          value: "admin"
        # --- Redis ---
        - name: REDIS_URL
          value: "redis://:CHANGE_ME@HOST_IP:6379/3"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: redis-password
        - name: SESSION_BACKEND
          value: "redis"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
        volumeMounts:
        - name: workspace
          mountPath: /app/workspace
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: workspace
        emptyDir: {}
      - name: uploads
        emptyDir: {}

---
# LambChat Service
apiVersion: v1
kind: Service
metadata:
  name: lambchat
  namespace: lambchat
spec:
  type: NodePort
  selector:
    app: lambchat
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30080
