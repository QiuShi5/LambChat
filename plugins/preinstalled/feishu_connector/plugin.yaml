id: feishu_connector
name: Feishu Connector
version: 1.0.0
api_version: v1
install_type: preinstalled
entrypoint: backend
permissions:
  - channel:read
  - channel:write
  - channel:delete
backend:
  runtime_effects:
    - action: enable
      effect: start_feishu_connector
    - action: disable
      effect: stop_feishu_connector
enabled_by_default: true
data_template: plugin-data-template
