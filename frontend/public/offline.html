<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f5f4" />
    <title>LambChat Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Source Sans 3",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f5f4;
        color: #292524;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #151210;
          color: #f5f5f4;
        }
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(1rem, env(safe-area-inset-top)) 1rem
          max(1rem, env(safe-area-inset-bottom));
      }

      main {
        width: min(100%, 28rem);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.65rem, 7vw, 2.4rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #78716c;
        font-size: 1rem;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.5rem;
        padding: 0 1rem;
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
      }

      button {
        border: 0;
        color: #fff;
        background: #292524;
        cursor: pointer;
      }

      a {
        color: #292524;
        background: transparent;
        border: 1px solid #d6d3d1;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: #d6d3d1;
        }

        button {
          color: #292524;
          background: #f5f5f4;
        }

        a {
          color: #f5f5f4;
          border-color: #57534e;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LambChat is offline</h1>
      <p>
        Reconnect to continue chatting, load files, and sync the latest
        workspace state.
      </p>
      <div class="actions" aria-label="Offline actions">
        <button type="button" onclick="location.reload()">Try again</button>
        <a href="/chat">Back to chat</a>
      </div>
    </main>
  </body>
</html>
